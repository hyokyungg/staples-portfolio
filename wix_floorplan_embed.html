<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'DM Sans', sans-serif; background: transparent; }
.fpz { transition: opacity .2s; opacity: .55; cursor: pointer; }
.fpz.fpz-active { opacity: 1; }
.fpz:hover { opacity: .8; }
.fp-svg { width: 100%; display: block; border-radius: 4px; border: 1px solid #E8E8E8; }
.fp-panel {
  margin-top: 2px; border: 1px solid #E8500A;
  border-radius: 4px; overflow: hidden;
  max-height: 0; transition: max-height .35s ease;
  background: #fff;
}
.fp-panel.open { max-height: 160px; }
.fp-panel-inner {
  padding: 18px 22px;
  display: grid; grid-template-columns: auto 1fr;
  gap: 4px 18px; align-items: start;
}
.fp-tag { font-size: 10px; font-weight: 600; letter-spacing: .13em; text-transform: uppercase; color: #E8500A; margin: 0; white-space: nowrap; padding-top: 3px; }
.fp-title { font-size: 14px; font-weight: 600; color: #111; margin: 0 0 4px; }
.fp-desc  { font-size: 13px; color: #777; margin: 0 0 5px; line-height: 1.6; }
.fp-shift { font-size: 12px; font-weight: 600; color: #E8500A; margin: 0; }
.fp-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 12px; padding: 9px 18px;
  border: 1px solid #E8500A; border-radius: 3px;
  font-size: 13px; font-weight: 500; color: #E8500A;
  text-decoration: none; cursor: pointer;
  background: transparent; transition: all .15s; font-family: inherit;
}
.fp-cta:hover { background: #E8500A; color: white; }
.fp-hint { font-size: 11px; color: #BBB; margin-top: 8px; font-style: italic; }
</style>
</head>

<div class="fp-panel" id="fp-panel">

<!-- ↓ store concept URL을 GitHub Pages 주소로 바꾸세요 -->
<button class="fp-cta" onclick="window.open('YOUR_GITHUB_PAGES_URL/staples_store_concept.html','_blank')">
  Explore full store concept →
</button>

<p class="fp-hint">Click each zone · A = Entrance · B = Focus Zone · C = Calibration Station · D = Collection Counter</p>

<script>
const fpData = {
  A:{ tag:'Zone A · Entrance',            title:'First impression',             desc:'Warm cream walls. Serif wayfinding. QR prompt links to the app. Staff greet returning customers by name.',                                              shift:'Curious but unsure → Guided' },
  B:{ tag:'Zone B · Focus Zone',          title:'Stay as long as you need',     desc:'Oak tables, pendant lighting, power at every seat. Café-adjacent workspace — the kind of table you sit at with a project.',                           shift:'Overwhelmed → Comfortable' },
  C:{ tag:'Zone C · Calibration Station', title:'The centrepiece',              desc:'Three stations. Navy body, orange counter edge. Files pre-loaded from your Drawer before you sit down. Screen colour vs print colour, side by side.', shift:'Frustrated → Confident' },
  D:{ tag:'Zone D · Collection Counter',  title:'A session, not a transaction', desc:'Kit bags printed with your project name. Calibration Card records adjustment values. Studio Receipt saves settings for next time.',                   shift:'Exit neutral → Curious about next visit' }
};
const panel = document.getElementById('fp-panel');

function fpSel(k) {
  const z = fpData[k];
  document.getElementById('fp-tag').textContent   = z.tag;
  document.getElementById('fp-title').textContent = z.title;
  document.getElementById('fp-desc').textContent  = z.desc;
  document.getElementById('fp-shift').textContent = z.shift;
  panel.classList.add('open');
  ['A','B','C','D'].forEach(id => {
    const area = document.getElementById('fpz-' + id);
    const dot  = document.getElementById('fpdot-' + id);
    if (area) area.classList.toggle('fpz-active', id === k);
    if (dot) {
      const c = dot.querySelector('circle'), t = dot.querySelector('text');
      if (id === k) { c.setAttribute('fill','#E8500A'); c.removeAttribute('stroke'); t.setAttribute('fill','white'); }
      else { c.setAttribute('fill','white'); c.setAttribute('stroke','#DDD9CE'); c.setAttribute('stroke-width','1.5'); t.setAttribute('fill','#1C2B3A'); }
    }
  });
}
fpSel('C');
</script>
